apiVersion: v1
kind: ConfigMap
metadata:
  name: python-app

data:
  app.py: |
    from flask import Flask

    app = Flask(__name__)

    @app.route("/")
    def home():
        return """
        <h1>🚀 Argo CD Python Demo</h1>
        <h2>Version 1</h2>
        """

    if __name__ == "__main__":
        app.run(host="0.0.0.0", port=5000)